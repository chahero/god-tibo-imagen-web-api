name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate-version:
    name: validate-version
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail

          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          version_file="$(tr -d '[:space:]' < VERSION)"
          pyproject_version="$(python -c "from pathlib import Path; import tomllib; data = tomllib.loads(Path('python/pyproject.toml').read_text(encoding='utf-8')); version = data.get('project', {}).get('version') or data.get('tool', {}).get('poetry', {}).get('version'); raise SystemExit('Could not determine version from python/pyproject.toml') if not version else print(version)")"

          if [[ "$package_version" != "$tag_version" ]]; then
            echo "package.json version ($package_version) does not match tag version ($tag_version)" >&2
            exit 1
          fi

          if [[ "$pyproject_version" != "$tag_version" ]]; then
            echo "pyproject.toml version ($pyproject_version) does not match tag version ($tag_version)" >&2
            exit 1
          fi

          if [[ "$version_file" != "$tag_version" ]]; then
            echo "VERSION file ($version_file) does not match tag version ($tag_version)" >&2
            exit 1
          fi

          echo "Validated release version: $tag_version"

  publish-npm:
    name: publish-npm
    runs-on: ubuntu-latest
    needs:
      - validate-version
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build type definitions
        run: npm run build:types

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: publish-pypi
    runs-on: ubuntu-latest
    needs:
      - validate-version
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        working-directory: python
        run: python -m pip install --upgrade pip build

      - name: Build Python distributions
        working-directory: python
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
